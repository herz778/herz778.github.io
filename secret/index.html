<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密入口</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5;}
        .box{background:#fff;padding:40px 30px;border-radius:16px;box-shadow:0 4px 20px #00000015;text-align:center;}
        h3{margin-bottom:25px;color:#333;}
        input{width:260px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;outline:none;}
        button{margin-top:15px;width:260px;padding:12px;background:#222;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
        .tip{margin-top:15px;color:red;font-size:14px;display:none;}
        .load-tip{color:#666;font-size:14px;margin-bottom:10px;}
    </style>
</head>
<body>
    <div class="box">
        <h3>请输入访问密码</h3>
        <div class="load-tip" id="loadTip">加载配置中...</div>
        <input type="password" id="pwdInput" placeholder="输入密码" disabled>
        <br>
        <button onclick="checkPwd()" disabled id="btnGo">确认进入</button>
        <div class="tip" id="tip">密码错误，请重新输入</div>
    </div>

<script>
document.oncontextmenu = ()=>false;
document.onkeydown = function(e){
    let k = e.keyCode || e.which;
    if(k===123||(e.ctrlKey&&(k===85||k===83||k===73)))return false;
};

let targetUrl = "";
const CORRECT_HASH = "12f176113f0db1afe910e8196a9e560d088c4bd7c53b97251698d3c6acb48707";

async function sha256(str){
    const buf = await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function loadTarget(){
    try{
        const res = await fetch("target.txt");
        if(!res.ok)throw new Error();
        targetUrl = (await res.text()).trim();
        document.getElementById("loadTip").innerText = "请输入访问密码";
        document.getElementById("pwdInput").disabled = false;
        document.getElementById("btnGo").disabled = false;
    }catch(err){
        document.getElementById("loadTip").innerText = "配置读取失败";
    }
}

async function checkPwd(){
    const inputVal = document.getElementById("pwdInput").value.trim();
    const tip = document.getElementById("tip");
    const inputHash = await sha256(inputVal);
    if(inputHash === CORRECT_HASH && targetUrl){
        location.href = targetUrl;
    }else{
        tip.style.display = "block";
    }
}

document.getElementById("pwdInput").addEventListener("keydown",e=>e.key==="Enter"&&checkPwd());
loadTarget();
</script>
</body>
</html>
