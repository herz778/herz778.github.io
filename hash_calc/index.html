<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文本/文件 Hash 计算器 MD5 SHA256</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:30px;max-width:900px;margin:0 auto;font-family:Microsoft YaHei,sans-serif;background:#f5f7fa;}
h2{margin-bottom:20px;color:#333;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 10px #00000015;margin-bottom:20px;}
textarea{width:100%;height:120px;padding:12px;border:1px solid #ddd;border-radius:6px;resize:vertical;font-size:14px;}
.btns{margin:15px 0;}
button{padding:8px 18px;border:none;border-radius:4px;background:#2d8cf0;color:#fff;cursor:pointer;margin-right:10px;}
button:hover{background:#1b76d8;}
input[type="file"]{margin:10px 0;}
.res-item{margin:8px 0;padding:10px;background:#f8f9fa;border-radius:4px;word-break:break-all;}
.label{font-weight:bold;color:#555;}
</style>
</head>
<body>

<h2>文本 & 文件 Hash 计算器</h2>

<div class="box">
    <h3>一、文本哈希计算</h3>
    <textarea id="txtInput" placeholder="在此输入要计算哈希的文本..."></textarea>
    <div class="btns">
        <button onclick="calcTextHash()">计算文本哈希</button>
        <button onclick="clearText()">清空</button>
    </div>
    <div id="textRes"></div>
</div>

<div class="box">
    <h3>二、文件哈希计算</h3>
    <input type="file" id="fileInput" onchange="calcFileHash()">
    <div id="fileRes"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<script>
// 计算文本哈希
function calcTextHash(){
    const txt = document.getElementById('txtInput').value;
    if(!txt){alert('请输入文本');return;}
    const md5 = CryptoJS.MD5(txt).toString();
    const sha1 = CryptoJS.SHA1(txt).toString();
    const sha256 = CryptoJS.SHA256(txt).toString();
    const sha512 = CryptoJS.SHA512(txt).toString();

    let html = `
    <div class="res-item"><span class="label">MD5：</span>${md5}</div>
    <div class="res-item"><span class="label">SHA1：</span>${sha1}</div>
    <div class="res-item"><span class="label">SHA256：</span>${sha256}</div>
    <div class="res-item"><span class="label">SHA512：</span>${sha512}</div>
    `;
    document.getElementById('textRes').innerHTML = html;
}

function clearText(){
    document.getElementById('txtInput').value = '';
    document.getElementById('textRes').innerHTML = '';
}

// 计算文件哈希
function calcFileHash(){
    const file = document.getElementById('fileInput').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.readAsArrayBuffer(file);
    reader.onload = function(e){
        const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
        const md5 = CryptoJS.MD5(wordArray).toString();
        const sha1 = CryptoJS.SHA1(wordArray).toString();
        const sha256 = CryptoJS.SHA256(wordArray).toString();
        const sha512 = CryptoJS.SHA512(wordArray).toString();

        let html = `
        <div class="res-item"><span class="label">文件名：</span>${file.name}</div>
        <div class="res-item"><span class="label">大小：</span>${file.size} 字节</div>
        <div class="res-item"><span class="label">MD5：</span>${md5}</div>
        <div class="res-item"><span class="label">SHA1：</span>${sha1}</div>
        <div class="res-item"><span class="label">SHA256：</span>${sha256}</div>
        <div class="res-item"><span class="label">SHA512：</span>${sha512}</div>
        `;
        document.getElementById('fileRes').innerHTML = html;
    }
}
</script>
</body>
</html>
